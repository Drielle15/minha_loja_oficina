                <section id="cadastro">
        
                    <h1>Cadastro de Cliente</h1>
        
                    <form>
        
                        <label>Nome:</label><br>
                        <input type="text" required placeholder="Digite seu nome"><br><br>
        
                        <label>CPF:</label><br>
                        <input type="text" required placeholder="000.000.000-00"><br><br>
        
                        <label>Data de Nascimento:</label><br>
                        <input type="date" required placeholder="xx/xx/xxxx"><br><br>
        
                        <label>E-mail:</label><br>
                        <input type="email" required placeholder="Digite seu email"><br><br>
        
                        <label>Telefone:</label><br>
                        <input type="tel" required placeholder="Digite seu telefone"><br><br>
        
                        <label>Endereço:</label><br>
                        <input type="text" required placeholder="Rua, Avenida"><br><br>

                        <label>Nº</label><br>
                        <input type="email" required placeholder="Nº da casa"><br><br>
        
                        <label>Cidade:</label><br>
                        <input type="text" required placeholder="Digite sua cidade"><br><br>
        
                        <label>CEP:</label><br>
                        <input type="text" required placeholder="Digite seu CEP"><br><br>
        
                        <label>Senha:</label><br>
                        <input type="password" required placeholder="Digite sua senha"><br><br>
        
                        <label>Confirmar Senha:</label><br>
                        <input type="password" required placeholder="Confirme sua senha"><br><br>
        
                        <button type="submit">Cadastrar</button>
        
                    </form>
        
                </section>
